  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

    overflow-x: hidden;\n  }\n\n  /* -------- CRT envelope -------- */\n  .crt { position: relative; min-height: 100vh;\n    background: radial-gradient(ellipse at center, var(--bg-1) 0%, var(--bg-0) 70%, #000 100%); }\n  .crt::before {\n    content: \"\"; position: fixed; inset: 0;\n    background-image: repeating-linear-gradient(to bottom,\n      rgba(0,0,0,0) 0 2px, rgba(0,0,0,var(--scanline-opacity)) 3px 3px);\n    pointer-events: none; z-index: 9998; mix-blend-mode: multiply;\n  }\n  .crt::after {\n    content: \"\"; position: fixed; inset: 0;\n    background: radial-gradient(ellipse at center, rgba(0,0,0,0) 55%, rgba(0,0,0,0.55) 100%);\n    pointer-events: none; z-index: 9999;\n    animation: flicker 7s infinite steps(1);\n  }\n  @keyframes flicker {\n    0%,48%,50%,82%,83%,100% { opacity: 1; }\n    49% { opacity: calc(1 - var(--flicker-opacity) * 4); }\n    82.5% { opacity: calc(1 - var(--flicker-opacity) * 6); }\n  }\n\n  /* -------- Boot overlay -------- */\n  #boot {\n    position: fixed; inset: 0;\n    background: var(--bg-0); z-index: 10000;\n    padding: 40px 60px; font-family: var(--mono); font-size: 14px;\n    color: var(--fg-1); overflow: hidden;\n  }\n  #boot.hidden { opacity: 0; pointer-events: none; transition: opacity 0.6s ease-out; }\n  #boot .line { white-space: pre; min-height: 1.5em; text-shadow: var(--glow); }\n  #boot .ok { color: var(--ok); }\n  #boot .dim { color: var(--fg-dim); }\n  #boot .ascii { color: var(--fg-1); text-shadow: var(--glow); font-size: 12px; line-height: 1.05; white-space: pre; margin-bottom: 14px; }\n  #boot .bar { margin-top: 10px; color: var(--fg-0); text-shadow: var(--glow); }\n\n  /* -------- Type -------- */\n  .pixel { font-family: var(--pixel); letter-spacing: 0.02em; }\n  h1, h2 { font-family: var(--pixel); font-weight: 400; letter-spacing: 0.03em; margin: 0; color: var(--fg-0); text-shadow: var(--glow); }\n  h1 { font-size: 44px; line-height: 1; }\n  h2 { font-size: 28px; line-height: 1.1; }\n  .dim { color: var(--fg-dim); }\n  .fg0 { color: var(--fg-0); }\n  .warn { color: var(--warn); text-shadow: 0 0 6px rgba(251,191,36,0.4); }\n  .crit { color: var(--crit); text-shadow: 0 0 6px rgba(248,113,113,0.4); }\n  .ok { color: var(--ok); text-shadow: 0 0 6px rgba(74,222,128,0.4); }\n  a { color: var(--fg-1); text-decoration: none; }\n  a:hover { color: var(--fg-0); text-decoration: underline; }\n\n  /* -------- Tabs -------- */\n  .top {\n    position: sticky; top: 0; z-index: 500;\n    background: var(--bg-0);\n    border-bottom: 1px solid var(--fg-dimmer);\n  }\n  .head {\n    display: grid;\n    grid-template-columns: auto 1fr auto;\n    gap: 24px; align-items: center;\n    padding: 16px 28px 10px;\n  }\n  .logo {\n    display: flex; align-items: center; gap: 14px;\n    font-family: var(--pixel); font-size: 44px; color: var(--fg-0); text-shadow: var(--glow);\n    line-height: 0.9;\n  }\n  .logo .mark {\n    width: 42px; height: 42px;\n    border: 2px solid var(--fg-1); border-radius: 50%;\n    display: grid; place-items: center;\n    position: relative; box-shadow: var(--glow);\n  }\n  .logo .mark::before, .logo .mark::after { content: \"\"; position: absolute; background: var(--fg-1); box-shadow: var(--glow); }\n  .logo .mark::before { width: 28px; height: 2px; }\n  .logo .mark::after { width: 2px; height: 28px; }\n  .logo .mark .inner { width: 12px; height: 12px; border: 2px solid var(--fg-1); border-radius: 50%; background: var(--bg-0); position: relative; z-index: 1; }\n  .logo .sub {\n    display: block;\n    font-family: var(--mono); font-size: 11px;\n    color: var(--fg-dim); letter-spacing: 0.2em;\n    margin-top: 2px;\n  }\n  .head .id {\n    font-family: var(--mono); font-size: 11px;\n    color: var(--fg-dim); letter-spacing: 0.15em;\n    line-height: 1.6;\n  }\n  .head .id .v { color: var(--fg-1); }\n  .clock { text-align: right; }\n  .clock .big { font-family: var(--pixel); font-size: 36px; line-height: 1; color: var(--fg-0); text-shadow: var(--glow); }\n  .clock .sm { font-family: var(--mono); font-size: 11px; color: var(--fg-dim); letter-spacing: 0.15em; margin-top: 4px; }\n\n  .tabs {\n    display: flex;\n    padding: 0 28px;\n    border-top: 1px solid var(--fg-dimmer);\n    overflow-x: auto;\n  }\n  .tabs button {\n    background: none; border: none; border-right: 1px solid var(--fg-dimmer);\n    color: var(--fg-dim); font-family: var(--mono); font-size: 12px;\n    padding: 11px 18px; letter-spacing: 0.12em; text-transform: uppercase;\n    cursor: pointer; position: relative; white-space: nowrap;\n  }\n  .tabs button:first-child { border-left: 1px solid var(--fg-dimmer); }\n  .tabs button:hover { color: var(--fg-0); background: var(--bg-1); }\n  .tabs button.active { color: var(--fg-0); background: var(--bg-1); }\n  .tabs button.active::after {\n    content: \"\"; position: absolute; left: 0; right: 0; bottom: -1px;\n    height: 2px; background: var(--fg-1); box-shadow: var(--glow);\n  }\n\n  .alert {\n    display: flex; align-items: center; gap: 14px;\n    padding: 10px 28px;\n    border-top: 1px solid var(--fg-dimmer);\n    font-family: var(--pixel); font-size: 20px;\n    letter-spacing: 0.04em;\n    background: var(--bg-0); color: var(--ok);\n  }\n  .alert[data-state=\"normal\"]   { background: color-mix(in oklab, var(--ok) 8%, var(--bg-0));     color: var(--ok);   border-top-color: color-mix(in oklab, var(--ok) 40%, var(--bg-0)); }\n  .alert[data-state=\"caution\"]  { background: color-mix(in oklab, var(--warn) 10%, var(--bg-0)); color: var(--warn); border-top-color: color-mix(in oklab, var(--warn) 45%, var(--bg-0)); animation: blink 1.6s infinite; }\n  .alert[data-state=\"critical\"] { background: color-mix(in oklab, var(--crit) 14%, var(--bg-0)); color: var(--crit); border-top-color: color-mix(in oklab, var(--crit) 55%, var(--bg-0)); animation: blink 0.9s infinite; }\n  @keyframes blink { 0%,100%{filter:brightness(1);} 50%{filter:brightness(1.35);} }\n  .alert .badge { font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; padding: 3px 8px; border: 1px solid currentColor; }\n\n  /* -------- Main -------- */\n  main { padding: 28px; max-width: 1400px; margin: 0 auto; }\n  .page { display: none; }\n  .page.active { display: block; }\n\n  .grid { display: grid; gap: 20px; }\n  .g2 { grid-template-columns: repeat(2, 1fr); }\n  .g3 { grid-template-columns: repeat(3, 1fr); }\n  .g-split { grid-template-columns: 2fr 1fr; }\n\n  .panel {\n    border: 1px solid var(--fg-dimmer);\n    background: linear-gradient(180deg, var(--bg-1) 0%, var(--bg-0) 100%);\n    padding: 16px 18px;\n    position: relative;\n  }\n  .panel::before {\n    content: \"\"; position: absolute; top: -1px; left: -1px; right: -1px; height: 1px;\n    background: linear-gradient(to right, transparent, var(--fg-1), transparent); opacity: 0.5;\n  }\n  .panel-title {\n    display: flex; align-items: center; justify-content: space-between;\n    font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em;\n    color: var(--fg-dim); margin-bottom: 12px; text-transform: uppercase;\n  }\n  .panel-title .right { color: var(--fg-dim); }\n\n  /* -------- Hero live numbers -------- */\n  .hero {\n    display: grid; grid-template-columns: repeat(4, 1fr);\n    gap: 0;\n    border: 1px solid var(--fg-dimmer);\n    background: linear-gradient(180deg, var(--bg-1) 0%, var(--bg-0) 100%);\n  }\n  .hero > div {\n    padding: 18px 22px;\n    border-right: 1px solid var(--fg-dimmer);\n    position: relative;\n  }\n  .hero > div:last-child { border-right: none; }\n  .hero .k { font-family: var(--mono); font-size: 10px; color: var(--fg-dim); letter-spacing: 0.2em; text-transform: uppercase; }\n  .hero .v { font-family: var(--pixel); font-size: 62px; line-height: 1; color: var(--fg-0); text-shadow: var(--glow); display: flex; align-items: baseline; gap: 4px; margin-top: 6px; }\n  .hero .v .u { font-size: 22px; color: var(--fg-1); }\n  .hero .sub { font-family: var(--mono); font-size: 11px; color: var(--fg-dim); letter-spacing: 0.1em; margin-top: 4px; }\n\n  /* -------- Chart panels -------- */\n  .chart-box { height: 220px; position: relative; }\n  .chart-box svg { width: 100%; height: 100%; display: block; }\n  .chart-axis { display: flex; justify-content: space-between; margin-top: 6px; font-family: var(--mono); font-size: 10px; color: var(--fg-dim); letter-spacing: 0.1em; }\n\n  /* -------- Subsystem list -------- */\n  .sub-row {\n    display: grid; grid-template-columns: 16px 1fr auto auto;\n    gap: 12px; align-items: center;\n    padding: 9px 0;\n    border-bottom: 1px dashed var(--fg-dimmer);\n    font-family: var(--mono); font-size: 13px;\n  }\n  .sub-row:last-child { border-bottom: none; }\n  .sub-row .ind { width: 10px; height: 10px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 6px var(--ok); }\n  .sub-row .ind.warn { background: var(--warn); box-shadow: 0 0 6px var(--warn); }\n  .sub-row .ind.off { background: var(--fg-dimmer); box-shadow: none; }\n  .sub-row .name { color: var(--fg-1); }\n  .sub-row .state { color: var(--fg-0); font-size: 11px; letter-spacing: 0.1em; }\n  .sub-row .mini { color: var(--fg-dim); font-size: 11px; }\n\n  /* -------- Log -------- */\n  .log {\n    font-family: var(--mono); font-size: 12px;\n    height: 420px; overflow: hidden; position: relative;\n    background: var(--bg-0); padding: 10px 12px;\n    border: 1px solid var(--fg-dimmer);\n  }\n  .log .l {\n    display: grid; grid-template-columns: 72px 56px 1fr;\n    gap: 10px; padding: 1px 0;\n    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\n  }\n  .log .t { color: var(--fg-dim); }\n  .log .lv { letter-spacing: 0.1em; }\n  .log .lv.I { color: var(--fg-1); }\n  .log .lv.W { color: var(--warn); }\n  .log .lv.E { color: var(--crit); }\n  .log .lv.D { color: var(--fg-dim); }\n  .log .m { color: var(--fg-0); overflow: hidden; text-overflow: ellipsis; }\n  .log::after {\n    content: \"\"; position: absolute; left: 0; right: 0; bottom: 0; height: 60px;\n    background: linear-gradient(to bottom, transparent, var(--bg-0));\n    pointer-events: none;\n  }\n\n  /* -------- Camera -------- */\n  .cam {\n    position: relative; aspect-ratio: 4/3;\n    background: repeating-linear-gradient(0deg, #0a0a0a 0 2px, #050505 2px 4px);\n    border: 1px solid var(--fg-dimmer); overflow: hidden;\n  }\n  .cam .noise {\n    position: absolute; inset: 0;\n    background-image:\n      radial-gradient(circle at 30% 40%, rgba(255,255,255,0.02) 0 2px, transparent 3px),\n      radial-gradient(circle at 70% 60%, rgba(255,255,255,0.02) 0 2px, transparent 3px),\n      radial-gradient(circle at 50% 50%, rgba(96,165,250,0.06) 0%, transparent 60%);\n    opacity: 0.6; animation: noise 0.3s steps(4) infinite;\n  }\n  @keyframes noise {\n    0% { transform: translate(0,0); } 25% { transform: translate(-1px,1px); }\n    50% { transform: translate(1px,-1px); } 75% { transform: translate(-1px,-1px); } 100% { transform: translate(1px,1px); }\n  }\n  .cam .figure {\n    position: absolute; left: 50%; top: 62%; transform: translate(-50%, -50%);\n    width: 46%; aspect-ratio: 1/1.2;\n    background:\n      radial-gradient(ellipse 45% 30% at 50% 22%, rgba(96,165,250,0.28) 0%, transparent 70%),\n      radial-gradient(ellipse 60% 50% at 50% 75%, rgba(96,165,250,0.22) 0%, transparent 70%);\n  }\n  .cam .bbox {\n    position: absolute; left: 33%; top: 20%; width: 34%; height: 48%;\n    border: 2px solid var(--fg-1); box-shadow: 0 0 10px rgba(96,165,250,0.5);\n  }\n  .cam .bbox .corner { position: absolute; width: 14px; height: 14px; border: 2px solid var(--fg-1); }\n  .cam .bbox .corner.tl { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }\n  .cam .bbox .corner.tr { top: -2px; right: -2px; border-left: 0; border-bottom: 0; }\n  .cam .bbox .corner.bl { bottom: -2px; left: -2px; border-right: 0; border-top: 0; }\n  .cam .bbox .corner.br { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }\n  .cam .hud {\n    position: absolute; font-family: var(--mono) n-items: center; gap: 10px;\n    padding: 10px 14px;\n    background: var(--bg-1); border: 1px solid var(--fg-1);\n    color: var(--fg-0);\n    font-family: var(--mono); font-size: 11px;\n    letter-spacing: 0.18em; text-transform: uppercase;\n    cursor: pointer; text-shadow: var(--glow);\n  }\n  .btn:hover { background: var(--bg-2); }\n  .btn.primary { background: var(--fg-1); color: var(--bg-0); text-shadow: none; }\n  .btn.primary:hover { background: var(--fg-0); }\n  .btn.ghost { background: transparent; border-color: var(--fg-dimmer); color: var(--fg-dim); }\n  .btn.ghost:hover { color: var(--fg-0); border-color: var(--fg-1); }\n  .btn.danger { border-color: var(--crit); color: var(--crit); }\n  .btn.danger:hover { background: color-mix(in oklab, var(--crit) 20%, var(--bg-0)); }\n  .btn .kbd { display: inline-grid; place-items: center; min-width: 22px; padding: 0 6px; height: 18px; border: 1px solid currentColor; font-size: 10px; }\n\n  .input-row {\n    display: grid; grid-template-columns: 140px 1fr;\n    align-items: center;\n    border: 1px solid var(--fg-dimmer);\n    background: var(--bg-0);\n  }\n  .input-row .k {\n    padding: 11px 12px; background: var(--bg-1);\n    border-right: 1px solid var(--fg-dimmer);\n    font-family: var(--mono); font-size: 11px;\n    letter-spacing: 0.15em; color: var(--fg-dim);\n    text-transform: uppercase;\n  }\n  .input-row input, .input-row select {\n    background: transparent; border: none; outline: none;\n    font-family: var(--pixel); font-size: 22px; color: var(--fg-0);\n    padding: 6px 12px; width: 100%;\n  }\n  .input-row input::placeholder { color: var(--fg-dim); }\n\n  /* -------- Capture grid -------- */\n  .shots {\n    display: grid; grid-template-columns: repeat(10, 1fr);\n    gap: 4px;\n  }\n  .shots .shot {\n    aspect-ratio: 1/1;\n    border: 1px solid var(--fg-dimmer);\n    background: var(--bg-2); position: relative;\n    display: grid; place-items: center;\n    font-family: var(--mono); font-size: 10 (--bg-2);\n    display: grid; place-items: center;\n    font-family: var(--pixel); font-size: 16px; color: var(--fg-0); text-shadow: var(--glow);\n  }\n  .chip {\n    display: inline-block; padding: 2px 8px;\n    border: 1px solid var(--fg-dimmer);\n    font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em;\n    color: var(--fg-dim); text-transform: uppercase;\n  }\n  .chip.ok { border-color: var(--ok); color: var(--ok); }\n\n  .empty-state {\n    padding: 48px 20px; text-align: center;\n    border: 1px dashed var(--fg-dimmer);\n    color: var(--fg-dim);\n  }\n  .empty-state .pixel-big { font-family: var(--pixel); font-size: 32px; color: var(--fg-1); letter-spacing: 0.04em; margin-bottom: 6px; }\n\n  /* -------- Training console -------- */\n  .console {\n    background: var(--bg-0); border: 1px solid var(--fg-dimmer);\n    padding: 12px 14px; font-family: var(--mono); font-size: 12px;\n    height: 300px; overflow: hidden; position: relative;\n  }\n  .console .line { padding: 2px 0; white-space: nowrap; }\n  .console::after {\n    content: \"\"; position: absolute; left: 0; right: 0; bottom: 0; height: 60px;\n    background: linear-gradient(to bottom, transparent, var(--bg-0));\n    pointer-events: none;\n  }\n\n  /* -------- Tweaks panel -------- */\n  #tweaks {\n    position: fixed; right: 20px; bottom: 20px; width: 280px;\n    background: var(--bg-0); border: 1px solid var(--fg-1);\n    box-shadow: 0 0 20px rgba(96,165,250,0.3);\n    padding: 12px 14px; z-index: 9000;\n    font-family: var(--mono); font-size: 11px; display: none;\n  }\n  #tweaks.open { display: block; }\n  #tweaks h4 {\n    font-family: var(--pixel); font-size: 20px; margin: 0 0 10px;\n    color: var(--fg-0); text-shadow: var(--glow);\n    border-bottom: 1px solid var(--fg-dimmer); padding-bottom: 6px;\n    display: flex; align-items: center; justify-content: space-between;\n  }\n  #tweaks .row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }\n  #tweaks label on<\u002Fspan><span class=\"right\" id=\"enrollStatus\">IDLE \u00b7 ENTER NAME TO BEGIN<\u002Fspan><\u002Fdiv>\n\n            <div class=\"input-row\">\n              <div class=\"k\">Name<\u002Fdiv>\n              <input id=\"enrollName\" placeholder=\"enter full name\u2026\">\n            <\u002Fdiv>\n            <div class=\"input-row\">\n              <div class=\"k\">Clearance<\u002Fdiv>\n              <select id=\"enrollClearance\">\n                <option>RESIDENT<\u002Foption>\n                <option>STAFF<\u002Foption>\n                <option>OVERSEER<\u002Foption>\n              <\u002Fselect>\n            <\u002Fdiv>\n\n            <div>\n              <div class=\"panel-title\"><span>Capture progress<\u002Fspan><span class=\"right\" id=\"capLabel\">0 / 20 \u00b7 0%<\u002Fspan><\u002Fdiv>\n              <div class=\"progbar\" style=\"margin-bottom:10px;\">\n                <div class=\"fill\" id=\"capFill\" style=\"width:0%\"><\u002Fdiv>\n                <span class=\"txt\" id=\"capTxt\">\u2591\u2591\u2591\u2591\u2591\u2591\u2591\u2591\u2591\u2591\u2591\u2591\u2591\u2591\u2591\u2591\u2591\u2591\u2591\u2591 0%<\u002Fspan>\n              <\u002Fdiv>\n              <div class=\"shots\" id=\"shots\"><\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex; gap:8px; flex-wrap:wrap;\">\n              <button class=\"btn primary\" id=\"captureBtn\"><span class=\"kbd\">SPC<\u002Fspan> CAPTURE<\u002Fbutton>\n              <button class=\"btn ghost\" id=\"retakeBtn\">RETAKE LAST<\u002Fbutton>\n              <button class=\"btn ghost\" id=\"resetBtn\">RESET<\u002Fbutton>\n              <button class=\"btn ghost\" id=\"cancelEnroll\" style=\"margin-left:auto;\">CANCEL<\u002Fbutton>\n            <\u002Fdiv>\n\n            <div class=\"dim\" style=\"font-size:10px; letter-spacing:0.14em; margin-top:-4px;\">\n              TRAINING STARTS AUTOMATICALLY AT SAMPLE 20 / 20\n            <\u002Fdiv>\n\n            <div class=\"panel\" style=\"padding:12px 14px; background:var(--bg-0);\" id=\"trainingPanel\">\n              <div class=\"panel-title\" style=\"margin-bottom:8px;\"><span>LBPH training<\u002Fspan><span class=\"right\" id=\"trainState\">IDLE<\u002Fspan><\u002Fdiv>\n              <div class=\"progbar\" style=\"margin-bottom:10px;\">\n                <div class=\"fill\" id=\"trainFill\" style=\"width:0%\"><\u002Fdiv>\n                <span class=\"txt\" id=\"trainTxt\">\u2591\u2591\u2591\u2591\u2591\u2591\u2591\u2591\u2591\u2591\u2591\u2591\u2591\u2591\u2591\u2591\u2591\u2591\u2591\u2591 0%<\u002Fspan>\n              <\u002Fdiv>\n              <div class=\"console\" id=\"trainConsole\" style=\"height:160px;\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"panel\" style=\"margin-top:20px;\">\n        <div class=\"panel-title\">\n          <span>Registered personnel<\u002Fspan>\n          <span class=\"right\">\n            <span id=\"peopleCount\">0<\u002Fspan> \u00b7 corpus <span id=\"corpusCount\">0<\u002Fspan> samples\n            <button class=\"btn primary\" id=\"openEnroll\" style=\"margin-left:14px; padding:4px 12px; font-size:11px;\">+ ADD PERSON<\u002Fbutton>\n          <\u002Fspan>\n        <\u002Fdiv>\n        <div id=\"peopleEmpty\" class=\"empty-state\">\n          <div class=\"pixel-big\">NO PERSONNEL REGISTERED<\u002Fdiv>\n          <div>Click <span class=\"fg0\">+ ADD PERSON<\u002Fspan> above to capture 20 samples and train the LBPH model.<\u002Fdiv>\n        <\u002Fdiv>\n        <table class=\"people\" id=\"peopleTable\" style=\"display:none;\">\n          <thead>\n            <tr>\n              <th style=\"width:56px;\"><\u002Fth>\n              <th>Name<\u002Fth>\n              <th>Clearance<\u002Fth>\n              <th>Samples<\u002Fth>\n              <th>Enrolled<\u002Fth>\n              <th>Status<\u002Fth>\n              <th style=\"width:80px;\"><\u002Fth>\n            <\u002Ftr>\n          <\u002Fthead>\n          <tbody id=\"peopleBody\"><\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ LOGS ============ -->\n    <section class=\"page\" data-tab=\"logs\" data-screen-label=\"03 Logs\">\n      <div class=\"panel\">\n        <div class=\"panel-title\"><span>System log \u00b7 vault/vault111/*<\u002Fspan><span class=\"right\"><span id=\"logRate2\">3.2<\u002Fspan> lines/s &nbsp; \u00b7 &nbsp; buffer 2048<\u002Fspan><\u002Fdiv>\n        <div class=\"log\" id=\"logFull\" style=\"height:520px;\"><\u002Fdiv>\n        <div style=\"display:flex; gap:8px; margin-top:12px; align-items:center;\">\n          <button class=\"btn ghost\">FILTER \u00b7 ALL LEVELS<\u002Fbutton>\n          <button class=\"btn ghost\">EXPORT<\u002Fbutton>\n          <span class=\"dim\" style=\"margin-left:auto; font-size:11px; letter-spacing:0.12em;\">AUTOSCROLL \u00b7 ON<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ SETTINGS ============ -->\n    <section class=\"page\" data-tab=\"settings\" data-screen-label=\"04 Settings\">\n      <div class=\"panel\">\n        <div class=\"panel-title\"><span>MQTT &amp; habitat configuration<\u002Fspan><span class=\"right\">/etc/vault-os/config.yaml<\u002Fspan><\u002Fdiv>\n        <div class=\"grid g2\">\n          <div style=\"display:flex; flex-direction:column; gap:10px;\">\n            <div class=\"input-row\"><div class=\"k\">Broker host<\u002Fdiv><input id=\"brokerInput\" value=\"192.168.1.100\"><\u002Fdiv>\n            <div class=\"input-row\"><div class=\"k\">Broker port<\u002Fdiv><input value=\"1883\"><\u002Fdiv>\n            <div class=\"input-row\"><div class=\"k\">Vault name<\u002Fdiv><input id=\"vaultInput\" value=\"VAULT 101\"><\u002Fdiv>\n            <div class=\"input-row\"><div class=\"k\">Keepalive<\u002Fdiv><input value=\"60s\"><\u002Fdiv>\n            <div class=\"input-row\"><div class=\"k\">QoS<\u002Fdiv><input value=\"1\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:10px;\">\n            <div class=\"input-row\"><div class=\"k\">Temp threshold<\u002Fdiv><input value=\"28.0 \u00b0C\"><\u002Fdiv>\n            <div class=\"input-row\"><div class=\"k\">CPU threshold<\u002Fdiv><input value=\"75.0 \u00b0C\"><\u002Fdiv>\n            <div class=\"input-row\"><div class=\"k\">RAM threshold<\u002Fdiv><input value=\"85 %\"><\u002Fdiv>\n            <div class=\"input-row\"><div class=\"k\">Disk threshold<\u002Fdiv><input value=\"90 %\"><\u002Fdiv>\n            <div class=\"input-row\"><div class=\"k\">Face threshold<\u002Fdiv><input value=\"85.0 %\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:8px; margin-top:14px;\">\n          <button class=\"btn primary\">APPLY &amp; RESTART SERVICES<\u002Fbutton>\n          <button class=\"btn ghost\">REVERT<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fmain>\n<\u002Fdiv>\n\n<!-- Tweaks -->\n<div id=\"tweaks\">\n  <h4>TWEAKS <button class=\"close\" id=\"twClose\">\u2715<\u002Fbutton><\u002Fh4>\n  <div class=\"row\">\n    <label>PHOSPHOR<\u002Flabel>\n    <div class=\"opts\" id=\"twPhosphor\">\n      <div class=\"opt\" data-v=\"blue\">BLU<\u002Fdiv>\n      <div class=\"opt\" data-v=\"amber\">AMB<\u002Fdiv>\n      <div class=\"opt\" data-v=\"green\">GRN<\u002Fdiv>\n      <div class=\"opt\" data-v=\"white\">W/B<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"row\">\n    <label>CRT INTENSITY \u00b7 <span id=\"twCrtVal\">50<\u002Fspan><\u002Flabel>\n    <input type=\"range\" min=\"0\" max=\"100\" step=\"5\" id=\"twCrt\" value=\"50\">\n  <\u002Fdiv>\n  <div class=\"row\">\n    <label>ALERT STATE<\u002Flabel>\n    <div class=\"opts\" id=\"twAlert\">\n      <div class=\"opt\" data-v=\"normal\">OK<\u002Fdiv>\n      <div class=\"opt\" data-v=\"caution\">WARN<\u002Fdiv>\n      <div class=\"opt\" data-v=\"critical\">CRIT<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"row\">\n    <label>VAULT NAME<\u002Flabel>\n    <input type=\"text\" id=\"twName\" value=\"VAULT 101\">\n  <\u002Fdiv>\n  <div class=\"row\">\n    <label>BROKER HOST<\u002Flabel>\n    <input type=\"text\" id=\"twBroker\" value=\"192.168.1.100\">\n  <\u002Fdiv>\n  <div class=\"row\" style=\"display:flex;flex-direction:row;gap:6px;\">\n    <button class=\"btn ghost\" id=\"twBoot\" style=\"flex:1;\">\u25b6 REPLAY BOOT<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  // ============== STATE ==============\n  const S = {\n    bufTemp: [], bufHum: [], bufCpuT: [], bufCpu: [], bufRam: [], bufDisk: [],\n    bufLen: 120,\n    enroll: { samples: 0, active: false, name: '' },\n    people: [],\n    training: { running: false, progress: 0 },\n    face: { name: null, conf: 0, frames: 0, pid: null },\n  };\n\n  // seed\n  (function seed(){\n    for (let i=0;i<S.bufLen;i++) {\n      S.bufTemp.push(21 + Math.sin(i/30)*0.8 + (Math.random()-0.5)*0.2);\n      S.bufHum.push(47 + Math.sin(i/40)*3 + (Math.random()-0.5)*0.8);\n      S.bufCpuT.push(54 + Math.sin(i/25)*4 + (Math.random()-0.5)*0.9);\n      S.bufCpu.push(32 + Math.sin(i/20)*10 + (Math.random()-0.5)*3);\n      S.bufRam.push(60 + Math.sin(i/33)*4 + (Math.random()-0.5)*1.5);\n      S.bufDisk.push(42 + Math.sin(i/60)*0.6 + (Math.random()-0.5)*0.2);\n    }\n  })();\n\n  function push(arr, v) { arr.push(v); while (arr.length > S.bufLen) arr.shift(); }\n\n  // ============== CHARTS ==============\n  function linePath(data, w, h, lo, hi, pad=8) {\n    if (!data.length) return '';\n    const rng = (hi - lo) || 1;\n    const step = w / (data.length - 1);\n    let d = '';\n    data.forEach((v,i) => {\n      const x = i*step;\n      const y = h - Math.max(0, Math.min(1, (v - lo)/rng)) * (h - pad*2) - pad;\n      d += (i===0 ? 'M ' : ' L ') + x.toFixed(1) + ' ' + y.toFixed(1);\n    });\n    return d;\n  }\n  function areaPath(data, w, h, lo, hi, pad=8) {\n    const line = linePath(data, w, h, lo, hi, pad);\n    return line + ` L ${w} ${h} L 0 ${h} Z`;\n  }\n  function gridSvg(id, w, h, cols=6, rows=4) {\n    const el = document.getElementById(id);\n    if (!el) return;\n    let s = '';\n    for (let c=0;c<=cols;c++) {\n      const x = (c/cols)*w;\n      s += `<line x1=\"${x}\" x2=\"${x}\" y1=\"0\" y2=\"${h}\" stroke=\"var(--fg-dimmer)\" stroke-width=\"1\" opacity=\"0.5\"/>`;\n    }\n    for (let r=0;r<=rows;r++) {\n      const y = (r/rows)*h;\n      s += `<line x1=\"0\" x2=\"${w}\" y1=\"${y}\" y2=\"${y}\" stroke=\"var(--fg-dimmer)\" stroke-width=\"1\" opacity=\"0.4\" stroke-dasharray=\"2 4\"/>`;\n    }\n    el.innerHTML = s;\n  }\n\n  function renderCharts() {\n    const W=600, H=220;\n    // Env: temp (main) + humidity (secondary, rescaled)\n    const tLo = Math.min(...S.bufTemp)-0.5, tHi = Math.max(...S.bufTemp)+0.5;\n    const hLo = Math.min(...S.bufHum)-2, hHi = Math.max(...S.bufHum)+2;\n    document.getElementById('lineT').setAttribute('d', linePath(S.bufTemp, W, H, tLo, tHi));\n    document.getElementById('areaT').setAttribute('d', areaPath(S.bufTemp, W, H, tLo, tHi));\n    document.getElementById('lineH').setAttribute('d', linePath(S.bufHum, W, H, hLo, hHi));\n\n    // Sys: CPU/RAM/Disk all 0-100\n    document.getElementById('lineCpu').setAttribute('d', linePath(S.bufCpu, W, H, 0, 100));\n    document.getElementById('lineRam').setAttribute('d', linePath(S.bufRam, W, H, 0, 100));\n    document.getElementById('lineDisk').setAttribute('d', linePath(S.bufDisk, W, H, 0, 100));\n  }\n\n  function renderHero() {\n    const t = S.bufTemp.at(-1), h = S.bufHum.at(-1), ct = S.bufCpuT.at(-1), cp = S.bufCpu.at(-1), r = S.bufRam.at(-1), d = S.bufDisk.at(-1);\n    document.getElementById('tempVal').textContent = t.toFixed(1);\n    document.getElementById('humVal').textContent = h.toFixed(0);\n    document.getElementById('cpuTVal').textContent = ct.toFixed(1);\n    document.getElementById('loadVal').textContent = (cp/100*4).toFixed(2);\n    document.getElementById('tempMin').textContent = Math.min(...S.bufTemp).toFixed(1);\n    document.getElementById('tempAvg').textContent = (S.bufTemp.reduce((a,b)=>a+b,0)/S.bufTemp.length).toFixed(1);\n    document.getElementById('tempMax').textContent = Math.max(...S.bufTemp).toFixed(1);\n    document.getElementById('humMin').textContent = Math.min(...S.bufHum).toFixed(0);\n    document.getElementById('humAvg').textContent = (S.bufHum.reduce((a,b)=>a+b,0)/S.bufHum.length).toFixed(0);\n    document.getElementById('humMax').textContent = Math.max(...S.bufHum).toFixed(0);\n    document.getElementById('curCpu').textContent = cp.toFixed(0)+'%';\n    document.getElementById('curRam').textContent = r.toFixed(0)+'%';\n    document.getElementById('curDisk').textContent = d.toFixed(0)+'%';\n  }\n\n  // ============== SUBSYSTEMS ==============\n  const SUBS = [\n    { name: 'MQTT \u00b7 mosquitto',       state: 'CONNECTED', note: ':1883 \u00b7 qos 1' },\n    { name: 'Flask + SocketIO',       state: 'RUNNING',   note: ':5000 \u00b7 1 client' },\n    { name: 'DHT22 sensor',           state: 'ONLINE',    note: 'GPIO4 \u00b7 last 420ms' },\n    { name: 'psutil telemetry',       state: 'RUNNING',   note: '2 Hz \u00b7 6 metrics' },\n    { name: 'OpenCV camera',          state: 'ONLINE',    note: '/dev/video0 \u00b7 30 FPS' },\n    { name: 'YuNet \u00b7 SFace',         state: 'LOADED',    note: '0 Personen \u00b7 0 Bilder' },\n  ];\n  function renderSubs() {\n    document.getElementById('subList').innerHTML = SUBS.map(s => `\n      <div class=\"sub-row\">\n        <div class=\"ind\"><\u002Fdiv>\n        <div class=\"name\">${s.name}<\u002Fdiv>\n        <div class=\"state\">${s.state}<\u002Fdiv>\n        <div class=\"mini\">${s.note}<\u002Fdiv>\n      <\u002Fdiv>\n    `).join('');\n  }\n\n  // ============== LOG ==============\n  const LOG_MSGS = [\n    ['I','[publisher] vault/vault111/temperature \u00b7 21.6\u00b0C'],\n    ['I','[publisher] vault/vault111/humidity \u00b7 47%'],\n    ['D','[mqtt] PUBACK msg_id=4812 \u00b7 qos=1'],\n    ['I','[face_worker] frame \u00b7 1 face \u00b7 conf awaiting model'],\n    ['I','[socket.io] emit state \u2192 1 client \u00b7 384 B'],\n    ['D','[psutil] cpu=34 mem=61 disk=42'],\n    ['I','[publisher] vault/vault111/cpu_temp \u00b7 54.2\u00b0C'],\n    ['I','[app] GET /api/state \u00b7 200 \u00b7 12ms'],\n    ['D','[mqtt] SUBACK vault/vault111/#'],\n    ['I','[publisher] vault/vault111/ram \u00b7 61.4%'],\n    ['W','[face_worker] blur variance 87 < 120 \u00b7 frame rejected'],\n    ['D','[opencv] cap.read() \u00b7 148ms \u00b7 1280x720'],\n    ['I','[publisher] vault/vault111/all \u00b7 412 B JSON'],\n    ['I','[publisher] heartbeat \u00b7 vault/vault111/hb'],\n    ['I','[app] socketio emit telemetry'],\n  ];\n  function now() {\n    const d = new Date();\n    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;\n  }\n  function pushLog() {\n    const [l, m] = LOG_MSGS[Math.floor(Math.random()*LOG_MSGS.length)];\n    const lvl = { I:'INFO', W:'WARN', E:'ERROR', D:'DEBUG' }[l];\n    const t = now();\n    ['log', 'logFull'].forEach(id => {\n      const el = document.getElementById(id);\n      if (!el) return;\n      const line = document.createElement('div');\n      line.className = 'l';\n      line.innerHTML = `<span class=\"t\">${t}<\u002Fspan><span class=\"lv ${l}\">${lvl}<\u002Fspan><span class=\"m\">${m}<\u002Fspan>`;\n      el.appendChild(line);\n      const limit = id === 'log' ? 22 : 44;\n      while (el.children.length > limit) el.removeChild(el.firstChild);\n    });\n  }\n  function initLog() {\n    for (let i=0;i<30;i++) pushLog();\n  }\n\n  // ============== PEOPLE ==============\n  function renderPeople() {\n    const empty = document.getElementById('peopleEmpty');\n    const table = document.getElementById('peopleTable');\n    const body = document.getElementById('peopleBody');\n    document.getElementById('peopleCount').textContent = S.people.length + ' person' + (S.people.length===1?'':'s');\n    document.getElementById('corpusCount').textContent = S.people.reduce((a,p)=>a+p.samples,0);\n\n    if (S.people.length === 0) {\n      empty.style.display = '';\n      table.style.display = 'none';\n      return;\n    }\n    empty.style.display = 'none';\n    table.style.display = '';\n    body.innerHTML = S.people.map((p,i) => `\n      <tr>\n        <td><div class=\"avatar\">${(p.name.split(' ').map(n=>n[0]).join('')||'??').slice(0,2).toUpperCase()}<\u002Fdiv><\u002Ftd>\n        <td class=\"name-cell\"><div style=\"font-family:var(--pixel); font-size:20px; line-height:1;\">${escapeHtml(p.name)}<\u002Fdiv>\n          <div class=\"dim\" style=\"font-size:10px; letter-spacing:0.15em; margin-top:2px;\">./faces/${p.name.toLowerCase().replace(/\\s+/g,'_')}/<\u002Fdiv><\u002Ftd>\n        <td>${p.clearance}<\u002Ftd>\n        <td>${p.samples}<\u002Ftd>\n        <td>${p.enrolled}<\u002Ftd>\n        <td><span class=\"chip ok\">ACTIVE<\u002Fspan><\u002Ftd>\n        <td style=\"text-align:right;\"><button class=\"btn danger\" data-del=\"${i}\" style=\"padding:4px 8px;font-size:10px;\">DEL<\u002Fbutton><\u002Ftd>\n      <\u002Ftr>\n    `).join('');\n    body.querySelectorAll('button[data-del]').forEach(b => {\n      b.onclick = () => {\n        S.people.splice(+b.dataset.del, 1);\n        renderPeople();\n        SUBS[5].note = `${S.people.length} persons \u00b7 ${S.people.reduce((a,p)=>a+p.samples,0)} samples`;\n        renderSubs();\n      };\n    });\n  }\n  function escapeHtml(s) { return (s||'').replace(/[&<>\"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'}[c])); }\n\n  // ============== ENROLLMENT ==============\n  function renderShots() {\n    const n = S.enroll.samples;\n    const el = document.getElementById('shots');\n    el.innerHTML = Array.from({length:20}).map((_,i)=>`\n      <div class=\"shot ${i<n?'captured':''}\" data-n=\"${String(i+1).padStart(2,'0')}\">${i>=n?String(i+1).padStart(2,'0'):''}<\u002Fdiv>\n    `).join('');\n    const pct = Math.round(n/20*100);\n    document.getElementById('capLabel').textContent = `${n} / 20 \u00b7 ${pct}%`;\n    document.getElementById('capFill').style.width = pct + '%';\n    const b = Math.round(n/20*20);\n    document.getElementById('capTxt').textContent = '\u2593'.repeat(b) + '\u2591'.repeat(20-b) + ' ' + pct + '%';\n    const ec = document.getElementById('enrollCounter');\n    if (ec) ec.innerHTML = `SAMPLE ${String(n).padStart(2,'0')} / 20<br/>REMAINING \u00b7 ${String(20-n).padStart(2,'0')}`;\n\n    const status = document.getElementById('enrollStatus');\n    if (!S.enroll.name) status.textContent = 'IDLE \u00b7 ENTER NAME TO BEGIN';\n    else if (n === 0) status.textContent = 'READY \u00b7 PRESS SPACE TO CAPTURE';\n    else if (n < 20) status.textContent = `CAPTURING \u00b7 ${20-n} SAMPLES REMAINING`;\n    else status.textContent = 'COMPLETE \u00b7 START TRAINING';\n  }\n\n  function doCapture() {\n    if (!S.enroll.name) return;\n    if (S.enroll.samples >= 20) return;\n    S.enroll.samples++;\n    renderShots();\n    // auto-start training when the 20th sample lands\n    if (S.enroll.samples === 20) {\n      setTimeout(startTraining, 400);\n    }\n  }\n  function retakeLast() { if (S.enroll.samples>0) { S.enroll.samples--; renderShots(); } }\n  function resetEnroll() { S.enroll.samples = 0; renderShots(); }\n\n  function startTraining() {\n    if (S.enroll.samples < 20 || !S.enroll.name) return;\n    if (S.training.running) return;\n    S.training.running = true;\n    S.training.progress = 0;\n    document.getElementById('trainState').textContent = 'RUNNING';\n    const console_ = document.getElementById('trainConsole');\n    console_.innerHTML = '';\n    const TRAIN_LINES = [\n      `[trainer] loading corpus from ./faces/${S.enroll.name.toLowerCase().replace(/\\s+/g,'_')}`,\n      `[trainer] discovered ${S.people.length+1} label(s) \u00b7 ${S.people.reduce((a,p)=>a+p.samples,0)+20} image(s)`,\n      '[trainer] preprocess: grayscale \u2192 resize(240,240) \u2192 histeq',\n      '[trainer] LBPHFaceRecognizer(radius=1, neighbors=8, gridX=8, gridY=8)',\n      '[trainer] epoch 01 \u00b7 loss=0.584 \u00b7 acc=0.713',\n      '[trainer] epoch 02 \u00b7 loss=0.412 \u00b7 acc=0.802',\n      '[trainer] epoch 03 \u00b7 loss=0.318 \u00b7 acc=0.851',\n      '[trainer] epoch 04 \u00b7 loss=0.264 \u00b7 acc=0.884',\n      '[trainer] epoch 05 \u00b7 loss=0.221 \u00b7 acc=0.912',\n      '[trainer] epoch 06 \u00b7 loss=0.188 \u00b7 acc=0.934',\n      '[trainer] epoch 07 \u00b7 loss=0.162 \u00b7 acc=0.948',\n      '[trainer] writing checkpoint \u2192 ./models/lbph.yml',\n      '[trainer] publishing model_ready \u2192 vault/vault111/model',\n      '[trainer] DONE',\n    ];\n    let i = 0;\n    const iv = setInterval(() => {\n      if (i < TRAIN_LINES.length) {\n        const d = document.createElement('div');\n        d.className = 'line';\n        const isDone = TRAIN_LINES[i].endsWith('DONE');\n        d.innerHTML = `<span class=\"dim\">${String(Math.floor(Math.random()*9999)).padStart(4,'0')}<\u002Fspan> &nbsp; <span class=\"${isDone?'ok':'fg0'}\">${TRAIN_LINES[i]}<\u002Fspan>`;\n        console_.appendChild(d);\n        while (console_.children.length > 9) console_.removeChild(console_.firstChild);\n        S.training.progress = Math.round((i+1)/TRAIN_LINES.length * 100);\n        document.getElementById('trainFill').style.width = S.training.progress + '%';\n        const b = Math.round(S.training.progress/100*20);\n        document.getElementById('trainTxt').textContent = '\u2593'.repeat(b) + '\u2591'.repeat(20-b) + ' ' + S.training.progress + '%';\n        i++;\n      } else {\n        clearInterval(iv);\n        S.training.running = false;\n        document.getElementById('trainState').textContent = 'DONE';\n        // commit person\n        const now = new Date();\n        S.people.push({\n          name: S.enroll.name,\n          clearance: document.getElementById('enrollClearance').value,\n          samples: 20,\n          enrolled: `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`,\n        });\n        SUBS[5].note = `${S.people.length} persons \u00b7 ${S.people.reduce((a,p)=>a+p.samples,0)} samples`;\n        renderSubs();\n        renderPeople();\n        S.enroll.name = '';\n        S.enroll.samples = 0;\n        document.getElementById('enrollName').value = '';\n        renderShots();\n        // auto return to detect mode after successful enrollment\n        setTimeout(() => { if (typeof window.setRecMode === 'function') window.setRecMode('detect'); }, 1200);\n      }\n    }, 350);\n  }\n\n  // ============== FACE ==============\n  function setFace(name, conf, pid) {\n    S.face.name = name; S.face.conf = conf; S.face.pid = pid;\n    S.face.frames++;\n    const cam = document.getElementById('faceCam');\n    if (!name) {\n      cam.classList.add('empty');\n      document.getElementById('faceTag').style.display = 'none';\n      document.querySelector('.cam-conf').style.display = 'none';\n      document.getElementById('faceName').textContent = '\u2014';\n      document.getElementById('facePid').textContent = '\u2014';\n      document.getElementById('faceConfNum').textContent = '0.0';\n      document.getElementById('faceConfFill').style.width = '0%';\n      document.getElementById('faceState').textContent = 'AWAITING';\n      document.getElementById('faceDec').textContent = 'below';\n      document.getElementById('faceUpdated').textContent = '\u2014';\n      document.getElementById('lastFace').textContent = '\u2014';\n      document.getElementById('lastConf').textContent = 'awaiting detection';\n    } else {\n      cam.classList.remove('empty');\n      document.getElementById('faceTag').style.display = '';\n      document.querySelector('.cam-conf').style.display = '';\n      document.getElementById('faceTagName').textContent = name.toUpperCase();\n      document.getElementById('faceTagConf').textContent = conf.toFixed(1) + '%';\n      document.getElementById('faceConfBar').style.setProperty('--w', conf + '%');\n      document.getElementById('faceName').textContent = name.toUpperCase();\n      document.getElementById('facePid').textContent = pid || '\u2014';\n      document.getElementById('faceConfNum').textContent = conf.toFixed(1);\n      document.getElementById('faceConfFill').style.width = conf + '%';\n      const pass = conf >= 85;\n      document.getElementById('faceState').textContent = pass ? 'MATCH' : 'LOW CONFIDENCE';\n      document.getElementById('faceDec').textContent = pass ? 'above \u00b7 MATCH' : 'below \u00b7 unknown';\n      document.getElementById('faceUpdated').textContent = now();\n      document.getElementById('lastFace').textContent = name.toUpperCase();\n      document.getElementById('lastConf').textContent = conf.toFixed(1) + '% \u00b7 ' + now();\n    }\n    document.getElementById('faceFrames').textContent = S.face.frames;\n  }\n  function simulateDetect() {\n    if (S.people.length === 0) {\n      pushLog();\n      document.getElementById('enrollStatus').textContent = 'NO PEOPLE \u00b7 ENROLL FIRST';\n      setTimeout(()=>renderShots(), 1500);\n      return;\n    }\n    const p = S.people[Math.floor(Math.random()*S.people.length)];\n    const conf = 80 + Math.random()*18;\n    setFace(p.name, conf, 'P-' + String(S.people.indexOf(p)+1).padStart(4,'0'));\n  }\n\n  // ============== CLOCK ==============\n  function renderClock() {\n    const d = new Date();\n    const hh = String(d.getHours()).padStart(2,'0');\n    const mm = String(d.getMinutes()).padStart(2,'0');\n    const ss = String(d.getSeconds()).padStart(2,'0');\n    document.getElementById('clock').textContent = `${hh}:${mm}:${ss}`;\n    const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];\n    const mos  = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];\n    document.getElementById('date').textContent = `${days[d.getDay()]} \u00b7 ${mos[d.getMonth()]} ${d.getDate()} \u00b7 ${d.getFullYear()}`;\n  }\n\n  // ============== ALERT ==============\n  function setAlert(s) {\n    const el = document.getElementById('alertBanner');\n    el.setAttribute('data-state', s);\n    const text = {\n      normal:   'ALL SYSTEMS NOMINAL \u00b7 HABITAT STABLE',\n      caution:  'CAUTION \u00b7 CPU APPROACHING THRESHOLD (73\u00b0C / 75\u00b0C) \u00b7 FAN RAMP',\n      critical: 'CRITICAL \u00b7 CPU HARD THRESHOLD EXCEEDED (86\u00b0C / 85\u00b0C) \u00b7 THERMAL THROTTLE',\n    }[s];\n    document.getElementById('alertText').textContent = text;\n  }\n\n  // ============== TICK ==============\n  function tick() {\n    push(S.bufTemp, S.bufTemp.at(-1) + (Math.random()-0.5)*0.25);\n    push(S.bufHum, S.bufHum.at(-1) + (Math.random()-0.5)*0.6);\n    push(S.bufCpuT, S.bufCpuT.at(-1) + (Math.random()-0.5)*0.8);\n    push(S.bufCpu, Math.max(4, Math.min(96, S.bufCpu.at(-1) + (Math.random()-0.5)*3.5)));\n    push(S.bufRam, Math.max(20, Math.min(95, S.bufRam.at(-1) + (Math.random()-0.5)*1.6)));\n    push(S.bufDisk, Math.max(5, Math.min(95, S.bufDisk.at(-1) + (Math.random()-0.5)*0.15)));\n    renderHero();\n    renderCharts();\n    pushLog();\n  }\n\n  // ============== TABS ==============\n  function setTab(name) {\n    document.querySelectorAll('.tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === name));\n    document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.dataset.tab === name));\n    window.scrollTo(0,0);\n  }\n\n  // ============== BOOT ==============\n  const BOOT_ASCII =\n`  \u2588\u2588\u2557   \u2588\u2588\u2557 \u2588\u2588\u2588\u2588\u2588\u2557 \u2588\u2588\u2557   \u2588\u2588\u2557\u2588\u2588\u2557  \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2557       \u2588\u2588\u2588\u2588\u2588\u2588\u2557 \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2557\n  \u2588\u2588\u2551   \u2588\u2588\u2551\u2588\u2588\u2554\u2550\u2550\u2588\u2588\u2557\u2588\u2588\u2551   \u2588\u2588\u2551\u2588\u2588\u2551  \u255a\u2550\u2550\u2588\u2588\u2554\u2550\u2550\u255d      \u2588\u2588\u2554\u2550\u2550\u2550\u2588\u2588\u2557\u2588\u2588\u2554\u2550\u2550\u2550\u2550\u255d\n  \u2588\u2588\u2551   \u2588\u2588\u2551\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2551\u2588\u2588\u2551   \u2588\u2588\u2551\u2588\u2588\u2551     \u2588\u2588\u2551   \u2588\u2588\u2588\u2588\u2588\u2557\u2588\u2588\u2551   \u2588\u2588\u2551\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2557\n  \u255a\u2588\u2588\u2557 \u2588\u2588\u2554\u255d\u2588\u2588\u2554\u2550\u2550\u2588\u2588\u2551\u2588\u2588\u2551   \u2588\u2588\u2551\u2588\u2588\u2551     \u2588\u2588\u2551   \u255a\u2550\u2550\u2550\u2550\u255d\u2588\u2588\u2551   \u2588\u2588\u2551\u255a\u2550\u2550\u2550\u2550\u2588\u2588\u2551\n   \u255a\u2588\u2588\u2588\u2588\u2554\u255d \u2588\u2588\u2551  \u2588\u2588\u2551\u255a\u2588\u2588\u2588\u2588\u2588\u2588\u2554\u255d\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2557\u2588\u2588\u2551         \u255a\u2588\u2588\u2588\u2588\u2588\u2588\u2554\u255d\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2551\n    \u255a\u2550\u2550\u2550\u255d  \u255a\u2550\u255d  \u255a\u2550\u255d \u255a\u2550\u2550\u2550\u2550\u2550\u255d \u255a\u2550\u2550\u2550\u2550\u2550\u2550\u255d\u255a\u2550\u255d          \u255a\u2550\u2550\u2550\u2550\u2550\u255d \u255a\u2550\u2550\u2550\u2550\u2550\u2550\u255d\n                HABITAT \u00b7 TERMINAL \u00b7 101                    `;\n  const BOOT_LINES = [\n    '> BIOS 2.17.1 \u00b7 BCM2712 \u00b7 8192 MB [OK]',\n    '> STORAGE /dev/mmcblk0 \u00b7 ext4 \u00b7 62.4 GB [OK]',\n    '> NETWORK eth0 up \u00b7 192.168.1.101/24 [OK]',\n    '> DHT22 GPIO4 \u00b7 21.4\u00b0C / 48% [OK]',\n    '> CAMERA /dev/video0 \u00b7 1280\u00d7720@30 [OK]',\n    '> MOSQUITTO 192.168.1.100:1883 [OK]',\n    '> FLASK :5000 \u00b7 SOCKET.IO eio4 [OK]',\n    '> FACE WORKER \u00b7 LBPH \u00b7 awaiting corpus [OK]',\n    '> HANDOFF \u00b7 DASHBOARD READY',\n    '',\n    '> WELCOME, OVERSEER.',\n  ];\n  const wait = ms => new Promise(r => setTimeout(r, ms));\n  async function runBoot() {\n    const boot = document.getElementById('boot');\n    boot.style.display = '';\n    boot.classList.remove('hidden');\n    document.getElementById('bootAscii').textContent = BOOT_ASCII;\n    const log = document.getElementById('bootLog');\n    log.innerHTML = '';\n    const bar = document.createElement('div');\n    bar.className = 'bar';\n    log.appendChild(bar);\n    for (let i=0;i<20;i++) {\n      await wait(30 + Math.random()*30);\n      const f = '\u25ae'.repeat(i+1), e = '\u25af'.repeat(20-(i+1));\n      bar.innerHTML = `  INITIALIZING ${f}${e}  ${String(Math.round((i+1)/20*100)).padStart(3,' ')}%`;\n    }\n    for (const l of BOOT_LINES) {\n      const el = document.createElement('div');\n      el.className = 'line';\n      el.innerHTML = l.replace(/\\[OK\\]/g, '<span class=\"ok\">[OK]<\u002Fspan>').replace(/> /g, '<span class=\"dim\">&gt;<\u002Fspan> ');\n      log.appendChild(el);\n      await wait(55 + Math.random()*40);\n    }\n    await wait(450);\n    boot.classList.add('hidden');\n    setTimeout(()=>{ boot.style.display='none'; }, 700);\n  }\n\n  // ============== TWEAKS ==============\n  function applyTweaks(t) {\n    Object.assign(window.VAULT_TWEAKS, t);\n    const T = window.VAULT_TWEAKS;\n    document.body.setAttribute('data-phosphor', T.phosphor);\n    const k = T.crtIntensity / 50;\n    document.documentElement.style.setProperty('--scanline-opacity', (0.14 * k).toFixed(3));\n    document.documentElement.style.setProperty('--flicker-opacity', (0.04 * k).toFixed(3));\n    setAlert(T.alertState);\n    document.getElementById('vaultName').textContent = T.vaultName;\n    document.getElementById('brokerLabel').textContent = T.broker + ':1883';\n    document.getElementById('vaultInput').value = T.vaultName;\n    document.getElementById('brokerInput').value = T.broker;\n\n    document.querySelectorAll('#twPhosphor .opt').forEach(o=>o.classList.toggle('on', o.dataset.v===T.phosphor));\n    document.querySelectorAll('#twAlert .opt').forEach(o=>o.classList.toggle('on', o.dataset.v===T.alertState));\n    const crt = document.getElementById('twCrt'); if (crt) { crt.value = T.crtIntensity; document.getElementById('twCrtVal').textContent = T.crtIntensity; }\n    const nm = document.getElementById('twName'); if (nm && nm !== document.activeElement) nm.value = T.vaultName;\n    const br = document.getElementById('twBroker'); if (br && br !== document.activeElement) br.value = T.broker;\n\n    try { window.parent.postMessage({type:'__edit_mode_set_keys', edits: t}, '*'); } catch(e){}\n  }\n\n  function wireTweaks() {\n    const panel = document.getElementById('tweaks');\n    window.addEventListener('message', (e) => {\n      const d = e.data || {};\n      if (d.type === '__activate_edit_mode') panel.classList.add('open');\n      if (d.type === '__deactivate_edit_mode') panel.classList.remove('open');\n    });\n    try { window.parent.postMessage({type:'__edit_mode_available'}, '*'); } catch(e){}\n\n    document.getElementById('twClose').onclick = () => panel.classList.remove('open');\n    document.querySelectorAll('#twPhosphor .opt').forEach(o => o.onclick = () => applyTweaks({ phosphor: o.dataset.v }));\n    document.querySelectorAll('#twAlert .opt').forEach(o => o.onclick = () => applyTweaks({ alertState: o.dataset.v }));\n    document.getElementById('twCrt').oninput = e => applyTweaks({ crtIntensity: +e.target.value });\n    document.getElementById('twName').oninput = e => applyTweaks({ vaultName: e.target.value });\n    document.getElementById('twBroker').oninput = e => applyTweaks({ broker: e.target.value });\n    document.getElementById('twBoot').onclick = () => runBoot();\n  }\n\n  // ============== WIRE ==============\n  function wire() {\n    document.querySelectorAll('.tabs button').forEach(b => b.onclick = () => setTab(b.dataset.tab));\n\n    document.getElementById('enrollName').oninput = e => { S.enroll.name = e.target.value.trim(); renderShots(); };\n    document.getElementById('captureBtn').onclick = doCapture;\n    document.getElementById('retakeBtn').onclick = retakeLast;\n    document.getElementById('resetBtn').onclick = resetEnroll;\n\n    document.getElementById('simDetect').onclick = simulateDetect;\n    document.getElementById('simClear').onclick = () => setFace(null, 0, null);\n\n    // ===== Recognition mode switch (detect <-> enroll) =====\n    window.setRecMode = function setRecMode(mode) {\n      const detect = document.getElementById('detectPane');\n      const enroll = document.getElementById('enrollPane');\n      const badge = document.getElementById('recModeBadge');\n      const title = document.getElementById('recModeTitle');\n      const hudTl = document.getElementById('camHudTl');\n      const footer = document.getElementById('enrollCamFooter');\n      const addBtn = document.getElementById('openEnroll');\n      document.querySelectorAll('.detect-only').forEach(el => el.style.display = mode === 'detect' ? '' : 'none');\n      if (mode === 'enroll') {\n        detect.style.display = 'none';\n        enroll.style.display = 'flex';\n        badge.textContent = 'MODE \u00b7 ENROLL';\n        badge.style.color = 'var(--warn)';\n        badge.style.borderColor = 'var(--warn)';\n        badge.style.textShadow = '0 0 6px var(--warn)';\n        title.textContent = 'Primary camera \u00b7 /dev/video0 \u00b7 ENROLLING NEW PERSON';\n        hudTl.innerHTML = 'ENROLL \u00b7 ARMED<br/>ALIGN FACE IN FRAME';\n        footer.style.display = 'flex';\n        addBtn.textContent = '\u00d7 CLOSE ENROLL';\n        setTimeout(() => document.getElementById('enrollName').focus(), 50);\n      } else {\n        detect.style.display = '';\n        enroll.style.display = 'none';\n        badge.textContent = 'MODE \u00b7 DETECT';\n        badge.style.color = '';\n        badge.style.borderColor = '';\n        badge.style.textShadow = '';\n        title.textContent = 'Primary camera \u00b7 /dev/video0 \u00b7 LBPH';\n        hudTl.innerHTML = 'CAM \u00b7 /dev/video0<br/>1280\u00d7720 \u00b7 30 FPS';\n        footer.style.display = 'none';\n        addBtn.textContent = '+ ADD PERSON';\n      }\n    }\n    document.getElementById('openEnroll').onclick = () => {\n      const enrollOpen = document.getElementById('enrollPane').style.display !== 'none';\n      setRecMode(enrollOpen ? 'detect' : 'enroll');\n    };\n    document.getElementById('cancelEnroll').onclick = () => {\n      S.enroll.samples = 0;\n      S.enroll.name = '';\n      document.getElementById('enrollName').value = '';\n      renderShots();\n      setRecMode('detect');\n    };\n\n    document.getElementById('vaultInput').oninput = e => applyTweaks({ vaultName: e.target.value });\n    document.getElementById('brokerInput').oninput = e => applyTweaks({ broker: e.target.value });\n\n    // SPACE to capture when on enrollment tab\n    window.addEventListener('keydown', (e) => {\n      const active = document.querySelector('.page.active');\n      if (active && active.dataset.tab === 'enroll' && e.code === 'Space' && document.activeElement.tagName !== 'INPUT') {\n        e.preventDefault();\n        doCapture();\n      }\n    });\n  }\n\n  // ============== INIT ==============\n  function init() {\n    gridSvg('gridEnv', 600, 220, 6, 4);\n    gridSvg('gridSys', 600, 220, 6, 4);\n    renderHero();\n    renderCharts();\n    renderSubs();\n    initLog();\n    renderShots();\n    renderPeople();\n    setFace(null, 0, null);\n    renderClock();\n    applyTweaks(window.VAULT_TWEAKS);\n    wire();\n    wireTweaks();\n\n    window._tickId = setInterval(tick, 1000);\n    setInterval(renderClock, 1000);\n\n    if (window.VAULT_TWEAKS.bootOnLoad) runBoot();\n    else document.getElementById('boot').style.display = 'none';\n  }\n\n  // --- real-backend bridge: expose internals ---\n  window._vS            = S;\n  window._vPush         = push;\n  window._vSetFace      = setFace;\n  window._vRenderHero   = renderHero;\n  window._vRenderCharts = renderCharts;\n  window._vRenderShots  = renderShots;\n  window._vEscHtml      = escapeHtml;\n  init();\n<\u002Fscript>\n\n\n\n\n<script>\n/* ===== REAL BACKEND INTEGRATION ===== */\nfunction initRealBackend() {\n\n  // stop simulation tick\n  window._realMode = true;\n  clearInterval(window._tickId);\n\n  // \u2500\u2500 Socket.IO \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  const socket = io();\n\n  socket.on('state_update', function(d) {\n    const S  = window._vS;\n    const vP = window._vPush;\n\n    if (d.temperature != null) vP(S.bufTemp,  d.temperature);\n    if (d.humidity    != null) vP(S.bufHum,   d.humidity);\n    if (d.cpu_temp    != null) vP(S.bufCpuT,  d.cpu_temp);\n    if (d.cpu_load    != null) vP(S.bufCpu,   d.cpu_load);\n    if (d.ram         != null) vP(S.bufRam,   d.ram);\n    if (d.disk        != null) vP(S.bufDisk,  d.disk);\n\n    window._vRenderHero();\n    window._vRenderCharts();\n\n    const fd  = d.face_detection || {};\n    const ac  = d.access         || {};\n    const dec = (ac.decision     || 'IDLE').toUpperCase();\n\n    if (fd.faces > 0 && fd.name && fd.name !== '---') {\n      // LBPH: lower confidence = better match; invert to percentage\n      const rawConf = fd.confidence || 0;\n      const pct     = Math.max(0, Math.min(100, rawConf));\n      window._vSetFace(fd.name, pct, null);\n    } else {\n      window._vSetFace(null, 0, null);\n    }\n\n    // colour-coded access decision overlay\n    var decEl = document.getElementById('faceDec');\n    if (decEl) {\n      decEl.textContent = dec;\n      decEl.style.color =\n        dec === 'ERLAUBT'    ? '#00ff7f' :\n        dec === 'VERWEIGERT' ? '#ff4444' :\n        dec === 'UNBEKANNT'  ? '#ffaa00' : '';\n    }\n  });\n\n  socket.on('log', function(d) {\n    var msg = (d.message || '').trim();\n    var t   = msg.replace(/^\\[(\\d+:\\d+:\\d+)\\].*/, '$1') || '--:--:--';\n    var body = msg.replace(/^\\[\\d+:\\d+:\\d+\\]\\s*/, '');\n    var isW = /WARN|ERROR/i.test(body);\n    var lv  = isW ? 'WARN' : 'INFO';\n    var lc  = isW ? 'W'    : 'I';\n    ['log', 'logFull'].forEach(function(id) {\n      var el = document.getElementById(id);\n      if (!el) return;\n      var line = document.createElement('div');\n      line.className = 'l';\n      line.innerHTML =\n        '<span class=\"t\">'  + t    + '<\u002Fspan>' +\n        '<span class=\"lv '  + lc   + '\">' + lv + '<\u002Fspan>' +\n        '<span class=\"m\">'  + window._vEscHtml(body) + '<\u002Fspan>';\n      el.appendChild(line);\n      var limit = id === 'log' ? 22 : 44;\n      while (el.children.length > limit) el.removeChild(el.firstChild);\n      el.scrollTop = el.scrollHeight;\n    });\n  });\n\n  socket.on('training_status', function(d) {\n    var pct = d.progress || 0;\n    var fillEl = document.getElementById('trainFill');\n    var txtEl  = document.getElementById('trainTxt');\n    if (fillEl) fillEl.style.width = pct + '%';\n    if (txtEl)  txtEl.textContent  = '\\u2593'.repeat(Math.round(pct/5)) + '\\u2591'.repeat(20 - Math.round(pct/5)) + ' ' + pct + '%';\n    if (d.message) {\n      var con = document.getElementById('trainConsole');\n      if (con) {\n        var div = document.createElement('div');\n        div.className = 'line';\n        div.innerHTML = '<span class=\"dim\">' + String(Date.now()).slice(-4) + '<\u002Fspan> &nbsp; <span>' + window._vEscHtml(d.message) + '<\u002Fspan>';\n        con.appendChild(div);\n        while (con.children.length > 9) con.removeChild(con.firstChild);\n      }\n    }\n    var stEl = document.getElementById('trainState');\n    if (d.active === false) {\n      if (stEl) stEl.textContent = 'DONE';\n      loadPersons();\n    } else if (d.active === true) {\n      if (stEl) stEl.textContent = 'RUNNING';\n    }\n  });\n\n  // \u2500\u2500 Capture button: call real API \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  var capBtn = document.getElementById('captureBtn');\n  if (capBtn) {\n    capBtn.onclick = function() {\n      var name = (document.getElementById('enrollName').value || '').trim();\n      if (!name) { alert('Enter a name first'); return; }\n      fetch('/api/capture', {\n        method: 'POST',\n        headers: {'Content-Type': 'application/json'},\n        body: JSON.stringify({name: name})\n      }).then(function(r){ return r.json(); }).then(function(d) {\n        if (d.error) { alert('Capture error: ' + d.error); return; }\n        var count = d.count || d.samples || 0;\n        window._vS.enroll.samples = count;\n        window._vS.enroll.name    = name;\n        window._vRenderShots();\n        if (count >= 20) {\n          setTimeout(function(){\n            fetch('/api/train', {method:'POST'});\n          }, 400);\n        }\n      }).catch(function(e){ console.error('capture error', e); });\n    };\n  }\n\n  // \u2500\u2500 Train button \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  var trainBtn = document.getElementById('btn-train');\n  if (trainBtn) {\n    trainBtn.onclick = function() { fetch('/api/train', {method:'POST'}); };\n  }\n\n  // \u2500\u2500 Person management \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  function escH(s) {\n    return (s || '').replace(/[&<>\"']/g, function(c){\n      return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'}[c];\n    });\n  }\n\n  function renderPeopleReal(people) {\n    var empty  = document.getElementById('peopleEmpty');\n    var table  = document.getElementById('peopleTable');\n    var body   = document.getElementById('peopleBody');\n    var cntEl  = document.getElementById('peopleCount');\n    var corEl  = document.getElementById('corpusCount');\n\n    if (cntEl) cntEl.textContent = people.length + ' person' + (people.length === 1 ? '' : 's');\n    if (corEl) corEl.textContent = people.reduce(function(a,p){ return a + (p.count||0); }, 0);\n    SUBS[5].note = people.length + ' Personen \u00b7 ' + people.reduce(function(a,p){ return a + (p.count||0); }, 0) + ' Bilder'; renderSubs();\n\n    if (people.length === 0) {\n      if (empty) empty.style.display = '';\n      if (table) table.style.display = 'none';\n      return;\n    }\n    if (empty) empty.style.display = 'none';\n    if (table) table.style.display = '';\n\n    body.innerHTML = people.map(function(p, i) {\n      var initials = (p.name.split(' ').map(function(n){ return n[0]; }).join('') || '??').slice(0,2).toUpperCase();\n      var chip     = p.allowed\n        ? '<span class=\"chip ok\">ERLAUBT<\u002Fspan>'\n        : '<span class=\"chip\" style=\"border-color:#ff4444;color:#ff4444;\">VERWEIGERT<\u002Fspan>';\n      var authLbl  = p.allowed ? 'REVOKE' : 'ALLOW';\n      var authCls  = p.allowed ? 'btn danger' : 'btn';\n      return '<tr>' +\n        '<td><div class=\"avatar\">' + initials + '<\u002Fdiv><\u002Ftd>' +\n        '<td class=\"name-cell\"><div style=\"font-family:var(--pixel);font-size:20px;line-height:1;\">' + escH(p.name) + '<\u002Fdiv>' +\n          '<div class=\"dim\" style=\"font-size:10px;letter-spacing:0.15em;margin-top:2px;\">./faces/' + escH(p.name.toLowerCase().replace(/\\s+/g,'_')) + '/<\u002Fdiv><\u002Ftd>' +\n        '<td>' + (p.allowed ? 'LEVEL-5' : 'NONE') + '<\u002Ftd>' +\n        '<td>' + (p.count || 0) + '<\u002Ftd>' +\n        '<td>\u2014<\u002Ftd>' +\n        '<td>' + chip + '<\u002Ftd>' +\n        '<td style=\"text-align:right;\">' +\n          '<button class=\"' + authCls + '\" data-auth=\"' + i + '\" data-name=\"' + escH(p.name) + '\" data-allowed=\"' + (p.allowed?'1':'0') + '\" style=\"padding:4px 8px;font-size:10px;margin-right:4px;\">' + authLbl + '<\u002Fbutton>' +\n          '<button class=\"btn danger\" data-del=\"' + i + '\" data-name=\"' + escH(p.name) + '\" style=\"padding:4px 8px;font-size:10px;\">DEL<\u002Fbutton>' +\n        '<\u002Ftd><\u002Ftr>';\n    }).join('');\n\n    body.querySelectorAll('button[data-del]').forEach(function(b) {\n      b.onclick = function() {\n        if (!confirm('Delete ' + b.dataset.name + '?')) return;\n        fetch('/api/persons/' + encodeURIComponent(b.dataset.name), {method:'DELETE'})\n          .then(loadPersons);\n      };\n    });\n    body.querySelectorAll('button[data-auth]').forEach(function(b) {\n      b.onclick = function() {\n        var isAllowed = b.dataset.allowed === '1';\n        fetch('/api/persons/' + encodeURIComponent(b.dataset.name) + '/allow',\n              {method: isAllowed ? 'DELETE' : 'POST'})\n          .then(loadPersons);\n      };\n    });\n  }\n\n  function loadPersons() {\n    fetch('/api/persons').then(function(r){ return r.json(); }).then(function(persons) {\n      renderPeopleReal(persons);\n    }).catch(function(e){ console.error('loadPersons error', e); });\n  }\n\n  loadPersons();\n  // refresh persons list every 10 seconds\n  setInterval(loadPersons, 10000);\n}\n\nsetTimeout(initRealBackend, 250);\n<\u002Fscript>\n<\u002Fbody><\u002Fhtml>"</script>
